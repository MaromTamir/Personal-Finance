<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Personal Finance</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="width:52px;height:52px;font-size:26px;border-radius:14px;background:#6366f1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;margin:0 auto 14px;">$</div>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Enter your password to access your finances</p>

    <div class="form-error" id="err"></div>

    <form id="form" onsubmit="login(event)">
      <div class="form-group">
        <label class="form-label" for="pwd">Password</label>
        <input type="password" id="pwd" class="form-input" placeholder="Your password" autocomplete="current-password" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn">Sign In</button>
    </form>
  </div>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pwd').value }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Login failed';
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch (_) {
    err.textContent = 'Could not reach the server.';
    err.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}

// Redirect to setup if no user exists yet
fetch('/api/auth/status').then(r => r.json()).then(d => {
  if (d.setup_required) window.location.href = '/setup.html';
  if (d.authenticated)  window.location.href = '/';
});
</script>
</body>
</html>

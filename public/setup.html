<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Password — Personal Finance</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon" style="width:52px;height:52px;font-size:26px;border-radius:14px;background:#6366f1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;margin:0 auto 14px;">$</div>
    </div>
    <h1 class="auth-title">Create your password</h1>
    <p class="auth-subtitle">Set a password to protect your financial data. You'll enter this each time you open the app.</p>

    <div class="form-error" id="err"></div>

    <form id="form" onsubmit="setup(event)">
      <div class="form-group">
        <label class="form-label" for="pwd">Password</label>
        <input type="password" id="pwd" class="form-input" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="pwd2">Confirm password</label>
        <input type="password" id="pwd2" class="form-input" placeholder="Repeat your password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn">Create Password</button>
    </form>
  </div>
</div>
<script>
async function setup(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const pwd  = document.getElementById('pwd').value;
  const pwd2 = document.getElementById('pwd2').value;

  err.style.display = 'none';

  if (pwd !== pwd2) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block';
    return;
  }

  btn.textContent = 'Creating…';
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Setup failed';
      err.style.display = 'block';
      btn.textContent = 'Create Password';
      btn.disabled = false;
    }
  } catch (_) {
    err.textContent = 'Could not reach the server.';
    err.style.display = 'block';
    btn.textContent = 'Create Password';
    btn.disabled = false;
  }
}

// If already set up, go to login
fetch('/api/auth/status').then(r => r.json()).then(d => {
  if (!d.setup_required) window.location.href = '/login.html';
  if (d.authenticated)   window.location.href = '/';
});
</script>
</body>
</html>
